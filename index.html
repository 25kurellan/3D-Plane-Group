<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 App Hub</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 28px; margin-bottom: 8px; }
        header p { color: var(--text-muted); font-size: 15px; }
        
        /* Grid container for dynamic apps */
        #app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .app-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .app-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border-radius: 18px; margin: 0 auto 16px auto;
            display: flex; justify-content: center; align-items: center; font-size: 32px;
        }
        .app-name { font-size: 20px; font-weight: 700; margin-bottom: 12px; word-break: break-word; }
        
        .download-btn {
            display: block; width: 100%; background-color: var(--accent); color: #0f172a;
            text-decoration: none; padding: 12px; border-radius: 10px; font-weight: 700;
            margin-bottom: 16px; transition: background 0.2s;
        }
        .download-btn:hover { background-color: var(--accent-hover); }
        
        .qr-code { background: white; padding: 8px; border-radius: 12px; display: inline-block; margin: 0 auto; }
        .loading { text-align: center; color: var(--text-muted); font-size: 18px; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>Base44 App Hub</h1>
        <p>Direct download server for custom native applications</p>
    </header>

    <main id="app-grid">
        <div class="loading">Scanning repository for applications...</div>
    </main>

    <script>
        // CONFIGURATION: Set your specific details here
        const USER = "25kurellan"; 
        const REPO = "3D-Plane-Group";

        async function fetchApps() {
            const grid = document.getElementById('app-grid');
            try {
                // Fetch public directory listing from GitHub API
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/apps`);
                if (!response.ok) throw new Error("Could not find the apps directory");
                
                const files = await response.json();
                
                // Clear the loading message
                grid.innerHTML = "";
                
                // Filter only files ending with .apk
                const apkFiles = files.filter(file => file.name.toLowerCase().endsWith('.apk'));
                
                if (apkFiles.length === 0) {
                    grid.innerHTML = `<div class="loading">No .apk files found in the /apps folder yet.</div>`;
                    return;
                }

                // Dynamically build layout elements for every app found
                apkFiles.forEach(file => {
                    // Clean up filename underscores/dashes for the readable card title
                    const readableName = file.name.replace(/\.apk$/i, '').replace(/[_-]/g, ' ');
                    const downloadUrl = `https://${USER}.github.io/${REPO}/apps/${file.name}`;
                    const qrUrl = `https://qrserver.com{encodeURIComponent(downloadUrl)}`;

                    const card = document.createElement('div');
                    card.className = 'app-card';
                    card.innerHTML = `
                        <div>
                            <div class="app-icon">🤖</div>
                            <div class="app-name">${readableName}</div>
                        </div>
                        <div>
                            <a href="${downloadUrl}" class="download-btn">Download APK</a>
                            <div class="qr-code">
                                <img src="${qrUrl}" alt="Scan QR" width="120" height="120">
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                grid.innerHTML = `<div class="loading" style="color: #ef4444;">Error mapping directory: ${error.message}</div>`;
            }
        }

        // Execute directory scanning on window load
        fetchApps();
    </script>
</body>
</html>
